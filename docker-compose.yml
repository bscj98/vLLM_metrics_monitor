version: "3"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway" 
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--storage.tsdb.retention.size=50GB'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"   # the default port used by Prometheus
    restart: always
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./password.txt:/etc/alertmanager/password.txt:ro
      - ./templates/vllm_alerts.tmpl:/etc/alertmanager/vllm_alerts.tmpl:ro
    ports:
      - "9093:9093" # Asumming that Alertmanager's server is hosted on port 9093
    restart: always
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000" # Asumiendo que el servidor de Grafana se alojará en el puerto 3001
    volumes:
      - grafana-storage:/var/lib/grafana  
      - ./dashboards:/etc/grafana/provisioning/dashboards 
      - ./datasources:/etc/grafana/provisioning/datasources
    restart: always
volumes:
  grafana-storage:
  prometheus-data:
